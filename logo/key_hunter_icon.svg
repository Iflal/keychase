<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="cyberTeal" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00E5FF"/>
            <stop offset="100%" stop-color="#0077FF"/>
        </linearGradient>
        <linearGradient id="alertMagenta" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF0077"/>
            <stop offset="100%" stop-color="#D500F9"/>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
    </defs>

    <g transform="translate(50, 35)">
        <!-- Outer Glowing Shield -->
        <path d="M 50 -10 L 115 10 L 115 60 C 115 95 85 125 50 140 C 15 125 -15 95 -15 60 L -15 10 Z" fill="url(#cyberTeal)" opacity="0.08"/>
        <path d="M 50 -10 L 115 10 L 115 60 C 115 95 85 125 50 140 C 15 125 -15 95 -15 60 L -15 10 Z" fill="none" stroke="url(#cyberTeal)" stroke-width="2.5" stroke-linejoin="round"/>

        <!-- Inner Shield Accent -->
        <path d="M 50 0 L 105 16 L 105 60 C 105 88 80 113 50 126 C 20 113 -5 88 -5 60 L -5 16 Z" fill="none" stroke="url(#cyberTeal)" stroke-width="1" opacity="0.5"/>

        <!-- The Eye Lens -->
        <path d="M 0 50 Q 50 0 100 50 Q 50 100 0 50 Z" fill="none" stroke="url(#cyberTeal)" stroke-width="4" filter="url(#glow)"/>
        <path d="M 0 50 Q 50 0 100 50 Q 50 100 0 50 Z" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>

        <!-- Radar Rings / Iris -->
        <circle cx="50" cy="50" r="24" fill="none" stroke="url(#cyberTeal)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.8"/>
        <circle cx="50" cy="50" r="18" fill="url(#alertMagenta)" opacity="0.2" />
        
        <!-- Crosshairs -->
        <line x1="50" y1="12" x2="50" y2="22" stroke="url(#cyberTeal)" stroke-width="2" stroke-linecap="round"/>
        <line x1="50" y1="78" x2="50" y2="88" stroke="url(#cyberTeal)" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="50" x2="22" y2="50" stroke="url(#cyberTeal)" stroke-width="2" stroke-linecap="round"/>
        <line x1="78" y1="50" x2="88" y2="50" stroke="url(#cyberTeal)" stroke-width="2" stroke-linecap="round"/>
        
        <!-- The Pupil / Keyhole -->
        <path d="M 50 36 C 45 36 42 40 42 44 C 42 48 44 50 45 51 L 40 64 A 1 1 0 0 0 41 66 L 59 66 A 1 1 0 0 0 60 64 L 55 51 C 56 50 58 48 58 44 C 58 40 55 36 50 36 Z" fill="url(#alertMagenta)" filter="url(#glow)"/>
        <path d="M 50 36 C 45 36 42 40 42 44 C 42 48 44 50 45 51 L 40 64 A 1 1 0 0 0 41 66 L 59 66 A 1 1 0 0 0 60 64 L 55 51 C 56 50 58 48 58 44 C 58 40 55 36 50 36 Z" fill="#FFFFFF" opacity="0.4"/>
    </g>
</svg>
